[package]
name = "flexaudio-ffi"
version.workspace = true
edition.workspace = true
license.workspace = true
# VAD アドオン（flexaudio-vad → ort / ONNX Runtime）のツールチェインが rustc 1.88 を
# 要求するので、workspace の 1.85 をここだけ上書きする（napi と同じ事情）。
rust-version = "1.88"
authors.workspace = true
repository.workspace = true
description = "C FFI bindings for flexaudio (pull-based C ABI; header generated by cbindgen)."
# staticlib/cdylib は crates.io ではライブラリとして消費できない（C から直接リンク
# して使う）。napi と同じく公開しない。
publish = false

# C から叩く第三の経路（第一は CLI パイプ、第二は N-API addon）。呼び出し側が
# poll_chunk / poll_event を周期的に呼ぶプル型の C ABI を出す。staticlib（.a）と
# cdylib（.so/.dll/.dylib）の両方を生成する。
[lib]
name = "flexaudio_ffi"
crate-type = ["staticlib", "cdylib"]

[dependencies]
flexaudio = { path = "../flexaudio" }
# アドオン（C ABI へ露出する VAD / FLAC / denoise）。いずれも純粋なオフライン処理で
# 実行時ネットワークは要らない（VAD はビルド時に onnxruntime を取得して静的リンク）。
flexaudio-vad = { path = "../flexaudio-vad" }
flexaudio-encode = { path = "../flexaudio-encode" }
flexaudio-denoise = { path = "../flexaudio-denoise" }
